name: Frontend Test

on:
  push:
    branches:
      - main
      - development
      - SCRUM-68-Fixed-functionality-for-the-application
  pull_request:
    branches:
      - main
      - development
      - SCRUM-68-Fixed-functionality-for-the-application
  workflow_dispatch:

jobs:
  frontend-test:
    name: Frontend test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./RAIN/OptiMeFrontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./RAIN/OptiMeFrontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate network config
        run: HOST_IP=127.0.0.1 npm run detect-ip

      - name: Run tests if available
        run: npm test --if-present

      - name: Run lint if available
        run: npm run lint --if-present

      - name: Run typecheck if available
        run: npm run typecheck --if-present
